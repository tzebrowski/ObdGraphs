spotless {
    kotlin {
        target '**/*.kt'
        ktlint("0.50.0")
        suppressLintsFor {
            step = "ktlint"
            shortCode = "standard:no-wildcard-imports"
        }

        suppressLintsFor {
            step = "ktlint"
            shortCode = "standard:kdoc-wrapping"
        }

        licenseHeaderFile "$project.rootDir/license-header"

        trimTrailingWhitespace()
        indentWithSpaces()
        endWithNewline()
    }
}